version: '3.8'

services:
  # API 网关服务 (端口 3030)
  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.api-gateway
    container_name: promotionai-api-gateway
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=host.docker.internal  # 使用主机上的现有数据库
      - DB_PORT=5432
      - DB_NAME=mo  # 使用新的数据库名
      - DB_USER=${DB_USER:-mo_user}
      - DB_PASSWORD=${DB_PASSWORD:-mo_password}
      - REDIS_HOST=host.docker.internal  # 使用主机上的现有 Redis
      - REDIS_PORT=6379  # 使用现有的 Redis 端口
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - COLLECTOR_PORT=3031
      - AI_PROCESSOR_PORT=3032
      - PUBLISHER_PORT=3033
      - TRACKER_PORT=3034
      - HEALTH_CHECK_PORT=3035
      - JWT_SECRET=${JWT_SECRET:-production_jwt_secret}
      - API_RATE_LIMIT=${API_RATE_LIMIT:-100}
      - API_RATE_WINDOW_MS=${API_RATE_WINDOW_MS:-900000}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - promotionai-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 资讯采集服务 (端口 3031)
  collector:
    build:
      context: .
      dockerfile: docker/Dockerfile.collector
    container_name: promotionai-collector
    ports:
      - "3031:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - COLLECTOR_PORT=3031
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=mo
      - DB_USER=${DB_USER:-mo_user}
      - DB_PASSWORD=${DB_PASSWORD:-mo_password}
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - COLLECTOR_INTERVAL_MINUTES=${COLLECTOR_INTERVAL_MINUTES:-30}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - promotionai-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # AI 处理服务 (端口 3032)
  ai-processor:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-processor
    container_name: promotionai-ai-processor
    ports:
      - "3032:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AI_PROCESSOR_PORT=3032
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=mo
      - DB_USER=${DB_USER:-mo_user}
      - DB_PASSWORD=${DB_PASSWORD:-mo_password}
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.7}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-2000}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - promotionai-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 渠道分发服务 (端口 3033)
  publisher:
    build:
      context: .
      dockerfile: docker/Dockerfile.publisher
    container_name: promotionai-publisher
    ports:
      - "3033:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUBLISHER_PORT=3033
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=mo
      - DB_USER=${DB_USER:-mo_user}
      - DB_PASSWORD=${DB_PASSWORD:-mo_password}
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PUBLISH_DELAY_SECONDS=${PUBLISH_DELAY_SECONDS:-5}
      - MAX_PUBLISH_RETRIES=${MAX_PUBLISH_RETRIES:-3}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - promotionai-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 埋点追踪服务 (端口 3034)
  tracker:
    build:
      context: .
      dockerfile: docker/Dockerfile.tracker
    container_name: promotionai-tracker
    ports:
      - "3034:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TRACKER_PORT=3034
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=mo
      - DB_USER=${DB_USER:-mo_user}
      - DB_PASSWORD=${DB_PASSWORD:-mo_password}
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TRACKING_DOMAIN=${TRACKING_DOMAIN:-localhost:3034}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - promotionai-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  promotionai-network:
    driver: bridge
