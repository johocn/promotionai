version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15
    container_name: promotionai-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-promotionai_dev}
      POSTGRES_USER: ${DB_USER:-dev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - promotionai-network
    restart: always
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=100
      -c random_page_cost=1.1

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: promotionai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - promotionai-network
    restart: always
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru

  # MongoDB数据库 (用于日志和临时数据)
  mongodb:
    image: mongo:6.0
    container_name: promotionai-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-dev_password}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - promotionai-network
    restart: always

  # API网关服务
  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.api-gateway
    container_name: promotionai-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - COLLECTOR_PORT=3001
      - AI_PROCESSOR_PORT=3002
      - PUBLISHER_PORT=3003
      - TRACKER_PORT=3004
      - JWT_SECRET=${JWT_SECRET:-default_jwt_secret_for_dev}
      - API_RATE_LIMIT=${API_RATE_LIMIT:-100}
      - API_RATE_WINDOW_MS=${API_RATE_WINDOW_MS:-900000}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - promotionai-network
    restart: always

  # 资讯采集服务
  collector:
    build:
      context: .
      dockerfile: docker/Dockerfile.collector
    container_name: promotionai-collector
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - COLLECTOR_PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_NAME=${DB_NAME:-promotionai_dev}
      - DB_USER=${DB_USER:-dev_user}
      - DB_PASSWORD=${DB_PASSWORD:-dev_password}
      - COLLECTOR_INTERVAL_MINUTES=${COLLECTOR_INTERVAL_MINUTES:-30}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - promotionai-network
    restart: always

  # AI处理服务
  ai-processor:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-processor
    container_name: promotionai-ai-processor
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AI_PROCESSOR_PORT=3002
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_NAME=${DB_NAME:-promotionai_dev}
      - DB_USER=${DB_USER:-dev_user}
      - DB_PASSWORD=${DB_PASSWORD:-dev_password}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.7}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-2000}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - promotionai-network
    restart: always

  # 内容分发服务
  publisher:
    build:
      context: .
      dockerfile: docker/Dockerfile.publisher
    container_name: promotionai-publisher
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUBLISHER_PORT=3003
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_NAME=${DB_NAME:-promotionai_dev}
      - DB_USER=${DB_USER:-dev_user}
      - DB_PASSWORD=${DB_PASSWORD:-dev_password}
      - PUBLISH_DELAY_SECONDS=${PUBLISH_DELAY_SECONDS:-5}
      - MAX_PUBLISH_RETRIES=${MAX_PUBLISH_RETRIES:-3}
      - SHORT_LINK_BASE_URL=${SHORT_LINK_BASE_URL:-http://localhost:3004}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - promotionai-network
    restart: always

  # 追踪服务
  tracker:
    build:
      context: .
      dockerfile: docker/Dockerfile.tracker
    container_name: promotionai-tracker
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TRACKER_PORT=3004
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_NAME=${DB_NAME:-promotionai_dev}
      - DB_USER=${DB_USER:-dev_user}
      - DB_PASSWORD=${DB_PASSWORD:-dev_password}
      - TRACKING_DOMAIN=${TRACKING_DOMAIN:-localhost:3004}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - promotionai-network
    restart: always

volumes:
  postgres_data:
  redis_data:
  mongodb_data:

networks:
  promotionai-network:
    driver: bridge